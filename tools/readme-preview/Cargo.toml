c3d-scene-schema.workspace = true
c3d-import-ply.workspace = true
c3d-asset-pointcloud.workspace = true
c3d-scene-ops.workspace = true
c3d-scene-doc.workspace = true
c3d-rhi.workspace = true
c3d-rhi-wgpu.workspace = true
c3d-viewport.workspace = true
gif = "0.13"
image = { workspace = true, default-features = false, features = ["png"] }
pollster.workspace = true
